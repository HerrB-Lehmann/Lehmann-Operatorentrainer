<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mr. Lehmanns Operatorentrainer</title>
  <style>
    :root {
      --bg: #07111f;
      --bg2: #0f172a;
      --panel: rgba(15, 23, 42, .90);
      --panel2: rgba(2, 6, 23, .72);
      --line: rgba(148, 163, 184, .25);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --muted2: #93a4b8;
      --blue: #2563eb;
      --blue2: #60a5fa;
      --teal: #0f766e;
      --teal2: #2dd4bf;
      --violet: #7c3aed;
      --violet2: #a78bfa;
      --gold: #fbbf24;
      --orange: #f97316;
      --green: #22c55e;
      --red: #ef4444;
      --rose: #fb7185;
      --shadow: 0 24px 70px rgba(0, 0, 0, .42);
      --radius: 28px;
    }

    * { box-sizing: border-box; }
    html { min-height: 100%; }
    body {
      min-height: 100%;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 8%, rgba(96, 165, 250, .28), transparent 26%),
        radial-gradient(circle at 92% 14%, rgba(45, 212, 191, .20), transparent 25%),
        radial-gradient(circle at 55% 98%, rgba(167, 139, 250, .18), transparent 28%),
        linear-gradient(180deg, #020617, var(--bg2) 55%, #07111f);
      overflow-x: hidden;
    }

    button, input, select { font: inherit; }

    .app {
      width: min(1440px, calc(100% - 28px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 20px 0 34px;
    }

    .glass {
      background: linear-gradient(180deg, rgba(15, 23, 42, .92), rgba(2, 6, 23, .74));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: clamp(22px, 3vw, 38px);
      margin-bottom: 18px;
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: -1px;
      background:
        linear-gradient(120deg, rgba(96,165,250,.16), transparent 32%),
        radial-gradient(circle at 86% 18%, rgba(251,191,36,.14), transparent 20%);
      pointer-events: none;
    }
    .hero > * { position: relative; z-index: 1; }

    .topline {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      color: #bfdbfe;
      font-weight: 800;
      letter-spacing: .01em;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid rgba(147,197,253,.30);
      background: rgba(15, 23, 42, .62);
      color: #bfdbfe;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: .95rem;
    }

    .title {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.25rem, 5vw, 4.9rem);
      line-height: .98;
      letter-spacing: -.035em;
      text-shadow: 0 12px 34px rgba(0,0,0,.34);
    }
    .subtitle {
      margin: 12px 0 0;
      color: #bfdbfe;
      font-size: clamp(1.02rem, 1.8vw, 1.25rem);
      line-height: 1.55;
      max-width: 1000px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr);
      gap: 24px;
      align-items: center;
      margin-top: 24px;
    }
    .logo-orb {
      width: 180px;
      height: 180px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      position: relative;
      border: 7px solid rgba(96, 165, 250, .96);
      background: radial-gradient(circle at 50% 20%, #1e3a8a, #172554 55%, #020617 100%);
      box-shadow: inset 0 0 35px rgba(96,165,250,.20), 0 20px 42px rgba(0,0,0,.35);
      margin: 0 auto;
    }
    .logo-orb::before, .logo-orb::after {
      content: "✦";
      position: absolute;
      color: var(--gold);
      font-size: 2.1rem;
      animation: twinkle 2.2s ease-in-out infinite;
    }
    .logo-orb::before { top: 6px; left: 4px; }
    .logo-orb::after { top: 24px; right: 16px; color: #34d399; animation-delay: .55s; }
    .sheet {
      width: 78px;
      height: 108px;
      border: 5px solid #2563eb;
      background: linear-gradient(180deg, #dbeafe, #bfdbfe);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.42);
      position: relative;
    }
    .sheet::before {
      content: "";
      position: absolute;
      left: 20px;
      right: 20px;
      top: 24px;
      height: 7px;
      border-radius: 4px;
      background: #1d4ed8;
      box-shadow: 0 25px 0 #1d4ed8, 0 50px 0 #1d4ed8;
    }
    .sheet::after {
      content: "?";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -42px;
      text-align: center;
      color: var(--gold);
      font: 900 50px Georgia, serif;
    }

    .controls-card {
      padding: 18px;
      display: grid;
      gap: 12px;
      background: rgba(15, 23, 42, .55);
      border: 1px solid rgba(148,163,184,.20);
      border-radius: 24px;
      margin-top: 16px;
    }
    .controls-title {
      color: var(--gold);
      font-family: Georgia, serif;
      font-size: 1.35rem;
      font-weight: 900;
      margin: 0;
    }
    .time-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .time-chip {
      border: 1px solid rgba(148,163,184,.26);
      background: rgba(2, 6, 23, .52);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 13px;
      cursor: pointer;
      font-weight: 900;
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
    }
    .time-chip:hover { transform: translateY(-1px); border-color: rgba(96,165,250,.70); }
    .time-chip.active {
      background: linear-gradient(180deg, #60a5fa, #2563eb);
      border-color: rgba(147,197,253,.90);
      box-shadow: 0 12px 28px rgba(37,99,235,.28);
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-top: 18px;
    }
    .mode-card {
      position: relative;
      overflow: hidden;
      padding: 24px;
      min-height: 270px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .mode-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(255,255,255,.11), transparent 34%);
      pointer-events: none;
    }
    .mode-card > * { position: relative; z-index: 1; }
    .mode-card h2 {
      margin: 0 0 10px;
      font-family: Georgia, serif;
      font-size: clamp(1.7rem, 2.5vw, 2.45rem);
      line-height: 1.05;
    }
    .mode-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-weight: 650;
    }
    .button-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }

    .btn {
      border: 0;
      cursor: pointer;
      color: #fff;
      border-radius: 18px;
      padding: 14px 18px;
      font-weight: 950;
      letter-spacing: .01em;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.15), 0 16px 28px rgba(0,0,0,.28);
      transition: transform .16s ease, filter .16s ease, opacity .16s ease;
      user-select: none;
    }
    .btn:hover:not(:disabled) { transform: translateY(-2px) scale(1.01); filter: brightness(1.08); }
    .btn:active:not(:disabled) { transform: translateY(0) scale(.99); }
    .btn:disabled { opacity: .52; cursor: default; }
    .btn.full { width: 100%; }
    .blue { background: linear-gradient(180deg, #60a5fa, #2563eb); }
    .teal { background: linear-gradient(180deg, #2dd4bf, #0f766e); }
    .violet { background: linear-gradient(180deg, #a78bfa, #7c3aed); }
    .orange { background: linear-gradient(180deg, #fbbf24, #f97316); color: #111827; }
    .slate { background: linear-gradient(180deg, #64748b, #334155); }
    .red { background: linear-gradient(180deg, #fb7185, #dc2626); }
    .green { background: linear-gradient(180deg, #4ade80, #16a34a); color: #052e16; }

    .screen { animation: fadeIn .28s ease both; }

    .setup-wrap { max-width: 980px; margin: 0 auto; }
    .setup-card { padding: 28px; }
    .setup-card h2 {
      margin: 0;
      font-family: Georgia, serif;
      font-size: clamp(2rem, 4vw, 3.2rem);
    }
    .setup-sub { margin: 8px 0 22px; color: #bfdbfe; font-weight: 800; line-height: 1.55; }
    .players-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin: 18px 0 22px;
    }
    .player-row {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }
    .badge {
      min-height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-weight: 1000;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16);
    }
    .p1 { background: linear-gradient(180deg,#60a5fa,#2563eb); }
    .p2 { background: linear-gradient(180deg,#a78bfa,#7c3aed); }
    .p3 { background: linear-gradient(180deg,#4ade80,#16a34a); color: #052e16; }
    .p4 { background: linear-gradient(180deg,#fbbf24,#f97316); color: #111827; }
    input[type="text"] {
      width: 100%;
      color: var(--text);
      background: rgba(2, 6, 23, .65);
      border: 1px solid rgba(148,163,184,.30);
      border-radius: 18px;
      padding: 15px 16px;
      outline: none;
      transition: box-shadow .18s ease, border-color .18s ease;
    }
    input[type="text"]:focus {
      border-color: rgba(96,165,250,.90);
      box-shadow: 0 0 0 4px rgba(96,165,250,.16);
    }

    .quiz-layout {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      gap: 16px;
      min-height: calc(100vh - 42px);
    }
    .sidebar, .content { padding: 18px; }
    .sidebar { display: flex; flex-direction: column; gap: 14px; }
    .sidebar-title {
      margin: 0;
      font-family: Georgia, serif;
      color: var(--gold);
      font-size: 2rem;
      line-height: 1.05;
    }
    .progress-label { color: var(--muted); font-weight: 900; line-height: 1.45; }
    .timer-box {
      display: none;
      border-radius: 18px;
      border: 1px solid rgba(148,163,184,.22);
      background: rgba(2, 6, 23, .55);
      padding: 13px;
    }
    .timer-box.active { display: block; }
    .timer-line { display: flex; justify-content: space-between; gap: 10px; color: #bfdbfe; font-weight: 1000; margin-bottom: 10px; }
    .timer-track {
      height: 14px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(148,163,184,.22);
    }
    .timer-fill {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #22c55e, #fbbf24, #ef4444);
      transition: width .18s linear;
    }
    .stat-list { display: grid; gap: 10px; }
    .stat-card {
      border-radius: 18px;
      padding: 4px;
      background: linear-gradient(180deg, #60a5fa, #2563eb);
    }
    .stat-inner {
      background: rgba(2, 6, 23, .78);
      border-radius: 14px;
      padding: 13px;
    }
    .stat-name { font-family: Georgia, serif; font-size: 1.08rem; margin-bottom: 5px; }
    .stat-value { font-size: 1.65rem; color: var(--gold); font-weight: 1000; }
    .stat-sub { margin-top: 4px; color: var(--muted); font-size: .94rem; font-weight: 750; }
    .turn-card { border-radius: 18px; padding: 4px; transition: transform .18s ease, box-shadow .18s ease; }
    .turn-card.active { transform: translateY(-1px); box-shadow: 0 0 0 2px rgba(251,191,36,.55), 0 0 24px rgba(251,191,36,.20); }
    .turn-inner { background: rgba(2, 6, 23, .78); border-radius: 14px; padding: 13px; }
    .turn-name { font-family: Georgia, serif; font-size: 1.18rem; margin-bottom: 5px; overflow-wrap: anywhere; }
    .turn-points { color: var(--gold); font-size: 1.25rem; font-weight: 1000; }
    .turn-line { color: var(--muted); font-weight: 750; margin-top: 4px; font-size: .95rem; }
    .side-note { color: #bfdbfe; line-height: 1.5; font-style: italic; font-weight: 700; }
    .sidebar-actions { margin-top: auto; display: flex; flex-wrap: wrap; gap: 10px; }

    .content { display: flex; flex-direction: column; min-width: 0; }
    .question-shell {
      border-radius: 28px;
      padding: 5px;
      background: linear-gradient(180deg, #60a5fa, #2563eb);
      margin-bottom: 14px;
    }
    .question-card { border-radius: 24px; background: rgba(2, 6, 23, .84); padding: clamp(16px, 2.5vw, 24px); }
    .question-head {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }
    .small-orb {
      width: 112px;
      height: 112px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 20%, #1e3a8a, #172554 55%, #020617 100%);
      border: 4px solid rgba(96,165,250,.92);
      margin: 2px auto 0;
      position: relative;
    }
    .small-sheet { width: 52px; height: 73px; border: 4px solid #2563eb; background: #dbeafe; position: relative; }
    .small-sheet::before { content: ""; position: absolute; left: 12px; right: 12px; top: 16px; height: 5px; background: #1d4ed8; box-shadow: 0 18px 0 #1d4ed8, 0 36px 0 #1d4ed8; }
    .small-sheet::after { content: "?"; position: absolute; left: 0; right: 0; bottom: -32px; text-align: center; font: 900 39px Georgia, serif; color: var(--gold); }
    .question-kicker { color: var(--teal2); font-weight: 1000; letter-spacing: .03em; text-transform: uppercase; font-size: .9rem; margin-bottom: 8px; }
    .question-title {
      margin: 0 0 10px;
      font-family: Georgia, serif;
      font-size: clamp(1.55rem, 2.6vw, 2.45rem);
      line-height: 1.08;
    }
    .question-text {
      margin: 0;
      color: #dbeafe;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.13rem, 1.85vw, 1.72rem);
      line-height: 1.34;
      overflow-wrap: anywhere;
      white-space: pre-line;
    }
    .question-text.long { font-size: clamp(1.02rem, 1.5vw, 1.32rem); line-height: 1.46; }
    .meta-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .meta-chip { color: #bfdbfe; background: rgba(96,165,250,.12); border: 1px solid rgba(96,165,250,.24); border-radius: 999px; padding: 7px 10px; font-weight: 900; font-size: .92rem; }
    .feedback {
      min-height: 48px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--gold);
      font-family: Georgia, serif;
      font-size: clamp(1.1rem, 1.8vw, 1.45rem);
      font-weight: 900;
      margin: 2px 0 12px;
    }
    .game-hud {
      display: grid;
      gap: 10px;
      border-radius: 20px;
      border: 1px solid rgba(251,191,36,.26);
      background: linear-gradient(180deg, rgba(251,191,36,.14), rgba(2,6,23,.50));
      padding: 13px;
    }
    .arena-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      color: var(--gold);
      font-family: Georgia, serif;
      font-weight: 1000;
      font-size: 1.18rem;
    }
    .level-chip {
      border-radius: 999px;
      background: rgba(251,191,36,.18);
      border: 1px solid rgba(251,191,36,.30);
      color: #fde68a;
      padding: 6px 10px;
      font: 950 .84rem Inter, sans-serif;
      white-space: nowrap;
    }
    .xp-track {
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(148,163,184,.22);
    }
    .xp-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #38bdf8, #a78bfa, #fbbf24);
      transition: width .28s ease;
    }
    .mission-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .mission-item {
      border-radius: 15px;
      background: rgba(2,6,23,.55);
      border: 1px solid rgba(148,163,184,.20);
      padding: 9px;
      min-height: 62px;
    }
    .mission-label {
      color: var(--muted2);
      font-size: .78rem;
      font-weight: 900;
      text-transform: uppercase;
    }
    .mission-value {
      color: var(--text);
      font-size: 1.15rem;
      font-weight: 1000;
      margin-top: 3px;
      overflow-wrap: anywhere;
    }
    .power-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .power-btn {
      min-height: 58px;
      border-radius: 16px;
      border: 1px solid rgba(96,165,250,.30);
      background: rgba(15,23,42,.82);
      color: var(--text);
      cursor: pointer;
      font-weight: 950;
      transition: transform .16s ease, border-color .16s ease, opacity .16s ease;
    }
    .power-btn:hover:not(:disabled) { transform: translateY(-1px); border-color: rgba(251,191,36,.80); }
    .power-btn:disabled { opacity: .42; cursor: default; }
    .boss-alert {
      display: none;
      margin: 0 0 12px;
      border-radius: 18px;
      border: 1px solid rgba(251,191,36,.35);
      background: linear-gradient(90deg, rgba(251,191,36,.16), rgba(124,58,237,.18));
      color: #fde68a;
      padding: 12px 14px;
      font-weight: 1000;
      text-align: center;
    }
    .boss-alert.active { display: block; animation: fadeIn .2s ease both; }
    .question-shell.boss {
      background: linear-gradient(180deg, #fbbf24, #7c3aed);
      box-shadow: 0 0 0 2px rgba(251,191,36,.38), 0 0 45px rgba(124,58,237,.34);
    }
    .choice.hidden-option { opacity: .16; pointer-events: none; filter: grayscale(1); }
    .level-pop {
      position: fixed;
      left: 50%;
      top: 18px;
      transform: translateX(-50%);
      z-index: 120;
      border-radius: 999px;
      background: linear-gradient(180deg, #fbbf24, #f97316);
      color: #111827;
      padding: 13px 18px;
      font-weight: 1000;
      box-shadow: 0 22px 44px rgba(0,0,0,.34);
      animation: levelPop 1.35s ease forwards;
    }
    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      flex: 1;
    }
    .choice {
      border: 0;
      cursor: pointer;
      border-radius: 24px;
      padding: 4px;
      background: rgba(148,163,184,.22);
      min-height: 150px;
      color: var(--text);
      display: flex;
      transition: transform .16s ease, filter .16s ease;
    }
    .choice:hover:not(.locked) { transform: translateY(-2px); filter: brightness(1.08); }
    .choice-inner {
      width: 100%;
      border-radius: 20px;
      background: rgba(15,23,42,.96);
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
    }
    .choice-badge {
      align-self: flex-start;
      min-width: 50px;
      text-align: center;
      border-radius: 14px;
      padding: 9px 11px;
      font-family: Georgia, serif;
      font-size: 1.18rem;
      font-weight: 1000;
      background: rgba(45,212,191,.75);
      color: #042f2e;
    }
    .choice-text {
      flex: 1;
      display: grid;
      place-items: center;
      text-align: center;
      font-family: Georgia, serif;
      font-size: clamp(1.18rem, 1.6vw, 1.55rem);
      line-height: 1.25;
      overflow-wrap: anywhere;
      word-break: break-word;
      padding: 6px;
    }
    .choice.binary .choice-text { font-size: clamp(1.5rem, 2.3vw, 2.05rem); }
    .choice.locked { cursor: default; }
    .choice.correct { background: var(--green); }
    .choice.correct .choice-inner { background: #14532d; }
    .choice.correct .choice-badge { background: #86efac; color: #052e16; }
    .choice.wrong { background: var(--red); }
    .choice.wrong .choice-inner { background: #7f1d1d; }
    .choice.wrong .choice-badge { background: #fca5a5; color: #450a0a; }
    .choice.highlight { background: var(--orange); }
    .choice.highlight .choice-inner { background: #78350f; }
    .explanation-box {
      display: none;
      margin-top: 12px;
      border-radius: 20px;
      border: 1px solid rgba(148,163,184,.24);
      background: rgba(2, 6, 23, .54);
      color: #e2e8f0;
      padding: 15px 17px;
      line-height: 1.55;
      font-weight: 720;
    }
    .explanation-box.active { display: block; animation: fadeIn .2s ease both; }

    .results-wrap { display: grid; gap: 18px; }
    .results-card { padding: 24px; }
    .results-title { margin: 0; font-family: Georgia, serif; font-size: clamp(2rem, 3.5vw, 3rem); color: var(--gold); }
    .results-sub { color: #bfdbfe; font-weight: 780; line-height: 1.55; margin: 8px 0 0; }
    .result-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; margin-top: 20px; }
    .winner-grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 16px; }
    .rank-list { display: grid; gap: 10px; margin-top: 16px; }
    .rank-card { border-radius: 20px; padding: 4px; }
    .rank-inner { background: rgba(2, 6, 23, .82); border-radius: 16px; padding: 15px; }
    .rank-name { font-family: Georgia, serif; font-size: 1.35rem; margin-bottom: 6px; overflow-wrap: anywhere; }
    .rank-line { color: var(--muted); font-weight: 800; }

    .confetti-layer { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 100; }
    .piece { position: absolute; width: 12px; height: 12px; opacity: .95; animation: fall linear forwards; }
    .piece.circle { border-radius: 999px; }
    .sparkle { position: absolute; width: 12px; height: 12px; border-radius: 999px; opacity: .95; pointer-events: none; animation: sparkleMove .65s ease forwards; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes twinkle { 0%,100% { transform: scale(1) rotate(0deg); opacity: 1; } 50% { transform: scale(1.18) rotate(14deg); opacity: .72; } }
    @keyframes fall { to { transform: translate3d(var(--dx), 110vh, 0) rotate(var(--rot)); opacity: .95; } }
    @keyframes sparkleMove { 0% { transform: scale(.45) translate(0,0); opacity: 1; } 100% { transform: scale(1.4) translate(var(--sx), var(--sy)); opacity: 0; } }
    @keyframes levelPop { 0% { opacity: 0; transform: translate(-50%, -14px) scale(.92); } 18%, 78% { opacity: 1; transform: translate(-50%, 0) scale(1); } 100% { opacity: 0; transform: translate(-50%, -10px) scale(.98); } }

    @media (max-width: 1180px) {
      .mode-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .quiz-layout { grid-template-columns: 1fr; }
      .sidebar { order: 2; }
      .content { order: 1; }
      .stat-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .mission-strip, .power-row { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 720px) {
      .app { width: min(100% - 18px, 1440px); padding-top: 10px; }
      .hero-grid, .mode-grid, .players-grid, .result-grid, .winner-grid, .choices, .question-head, .stat-list, .mission-strip, .power-row { grid-template-columns: 1fr; }
      .logo-orb { width: 150px; height: 150px; }
      .mode-card { min-height: 235px; }
      .question-card { padding: 15px; }
      .small-orb { margin-bottom: 8px; }
      .choice { min-height: 120px; }
      .button-row, .sidebar-actions { flex-direction: column; }
      .btn { width: 100%; }
