  <script>
    const APP_VERSION = "2026-05-04-quest-arena-combo-boss-joker";

    const OPERATORS = [
      { operator: "erörtern", definition: "Eine These oder Problemstellung auf ihren Wert und ihre Stichhaltigkeit hin abwägend prüfen und auf dieser Grundlage eine eigene Stellungnahme dazu entwickeln. Die Erörterung einer historischen Darstellung setzt deren Analyse voraus.", afb: "I–III" },
      { operator: "interpretieren", definition: "Sinnzusammenhänge aus Quellen erschließen und eine begründete Stellungnahme abgeben, die auf einer Analyse, Erläuterung und Bewertung beruht.", afb: "I–III" },
      { operator: "analysieren", definition: "Formale Merkmale von Materialien untersuchen und Inhalt und Gedankengang von Materialien (Quellen, Darstellungen) wiedergeben bzw. Bildelemente (Karikaturen, historische Gemälde) beschreiben.", afb: "überw. II" },
      { operator: "begründen", definition: "Aussagen (z. B. Urteil, These, Wertung) durch Argumente stützen, die auf historischen Beispielen und anderen Belegen gründen.", afb: "überw. II" },
      { operator: "beschreiben", definition: "Merkmale / Aspekte eines Sachverhaltes oder eines Materials detailliert darstellen.", afb: "I–II" },
      { operator: "beurteilen", definition: "Den Stellenwert historischer Sachverhalte in einem Zusammenhang bestimmen, um ohne persönlichen Wertebezug zu einem begründeten Sachurteil zu gelangen.", afb: "III" },
      { operator: "bewerten", definition: "Wie Operator ‚beurteilen‘, aber zusätzlich mit Offenlegen und Begründen eigener Wertmaßstäbe, die Pluralität einschließen und zu einem Werturteil führen, das auf den Wertvorstellungen des Grundgesetzes basiert.", afb: "III" },
      { operator: "charakterisieren", definition: "Historische Sachverhalte in ihren Eigenarten beschreiben und diese dann unter einem bestimmten Gesichtspunkt zusammenfassen.", afb: "II–III" },
      { operator: "einordnen", definition: "Einen oder mehrere historische Sachverhalte in einen historischen Zusammenhang stellen.", afb: "überw. II" },
      { operator: "entwickeln", definition: "Auf der Grundlage erarbeiteter Ergebnisse zu einer eigenen Deutung gelangen; gewonnene Analyseergebnisse verwerten, um in einem vorgegebenen Textformat (z. B. Rede, Leserbrief, Diskussionsbeitrag) zu einer eigenen Deutung zu gelangen.", afb: "II–III" },
      { operator: "erläutern", definition: "Historische Sachverhalte durch Wissen und Einsichten in einen Zusammenhang einordnen und durch zusätzliche Informationen und Beispiele verdeutlichen.", afb: "überw. II" },
      { operator: "herausarbeiten", definition: "Aus Materialien bestimmte historische Sachverhalte herausfinden, die nicht explizit genannt werden, und Zusammenhänge zwischen ihnen herstellen.", afb: "überw. II" },
      { operator: "nennen", definition: "Informationen / Sachverhalte / Merkmale zielgerichtet unkommentiert zusammentragen.", afb: "I–II" },
      { operator: "Stellung nehmen", definition: "Eine Problemstellung / eine Bewertung / eine Position auf der Grundlage fachlicher Kenntnisse prüfen und nach sorgfältiger Abwägung eine Einschätzung formulieren.", afb: "III" },
      { operator: "untersuchen", definition: "Materialien oder historische Sachverhalte kriterienorientiert bzw. aspektgeleitet erschließen.", afb: "überw. II" },
      { operator: "vergleichen", definition: "Auf der Grundlage von Kriterien historische Sachverhalte problembezogen gegenüberstellen, um Gemeinsamkeiten, Unterschiede, Teil-Identitäten, Ähnlichkeiten, Abweichungen oder Gegensätze darzustellen.", afb: "II–III" },
      { operator: "zusammenfassen", definition: "Sachverhalte / Aussagen komprimiert darstellen.", afb: "I–II" }
    ];

    const JUDGEMENT_EXAMPLES = [
      { kind: "Sachurteil", operator: "beurteilen", title: "Französische Revolution", text: "Die Französische Revolution ist als historischer Wendepunkt zu beurteilen, da sie die absolutistische Herrschaft infrage stellte und neue politische Leitideen wie Volkssouveränität, Freiheit und Gleichheit verbreitete. Zwar führte sie auch zu Gewalt und politischer Instabilität, dennoch veränderte sie langfristig das politische Denken in Europa. Ihr Stellenwert ist daher sehr hoch.", explanation: "Sachurteil: Der historische Stellenwert wird ohne eigenen Wertebezug bestimmt." },
      { kind: "Sachurteil", operator: "beurteilen", title: "Industrielle Revolution", text: "Die Industrialisierung kann als tiefgreifender gesellschaftlicher und wirtschaftlicher Umbruch beurteilt werden. Sie führte zu neuen Produktionsweisen, Urbanisierung und wirtschaftlichem Wachstum. Gleichzeitig entstanden soziale Probleme wie Armut, schlechte Arbeitsbedingungen und Wohnungsnot. Insgesamt hatte sie einen sehr hohen Stellenwert, weil sie Wirtschaft und Gesellschaft dauerhaft veränderte.", explanation: "Sachurteil: Die Bedeutung im historischen Zusammenhang wird abgewogen." },
      { kind: "Sachurteil", operator: "beurteilen", title: "Bismarcks Sozialgesetzgebung", text: "Bismarcks Sozialgesetzgebung ist als wichtiger Schritt in der Entwicklung des modernen Sozialstaats zu beurteilen. Sie verbesserte die Absicherung von Arbeitern bei Krankheit, Unfall und Alter. Allerdings diente sie auch politischen Zielen, da Bismarck die Arbeiterschaft stärker an den Staat binden und die Sozialdemokratie schwächen wollte. Insgesamt war ihr Stellenwert hoch, auch wenn ihre Motive nicht nur sozialpolitisch waren.", explanation: "Sachurteil: Es geht um Stellenwert, Ursachen und Folgen, nicht um eigene Wertmaßstäbe." },
      { kind: "Sachurteil", operator: "beurteilen", title: "Versailler Vertrag", text: "Der Versailler Vertrag ist als bedeutender Faktor für die politische Instabilität der Weimarer Republik zu beurteilen. Er belastete Deutschland durch Gebietsverluste, Reparationszahlungen und die Kriegsschuldfrage. Gleichzeitig war er nicht die alleinige Ursache für das Scheitern der Weimarer Republik, da auch innere politische Konflikte und wirtschaftliche Krisen eine Rolle spielten. Sein Stellenwert war daher hoch, aber nicht allein entscheidend.", explanation: "Sachurteil: Die historische Bedeutung wird differenziert eingeordnet." },
      { kind: "Sachurteil", operator: "beurteilen", title: "Weimarer Verfassung", text: "Die Weimarer Verfassung ist ambivalent zu beurteilen. Einerseits enthielt sie demokratische Elemente wie allgemeine Wahlen, Grundrechte und parlamentarische Strukturen. Andererseits schwächten Regelungen wie Artikel 48 und die starke Stellung des Reichspräsidenten die parlamentarische Demokratie. Insgesamt hatte die Verfassung einen hohen Stellenwert, da sie sowohl demokratische Chancen eröffnete als auch strukturelle Risiken enthielt.", explanation: "Sachurteil: Chancen und Risiken werden im historischen Zusammenhang abgewogen." },
      { kind: "Sachurteil", operator: "beurteilen", title: "Weltwirtschaftskrise 1929", text: "Die Weltwirtschaftskrise ist als entscheidender Verstärker der politischen Krise der Weimarer Republik zu beurteilen. Sie führte zu Massenarbeitslosigkeit, sozialer Not und Vertrauensverlust in demokratische Parteien. Dennoch war sie nicht die alleinige Ursache für den Aufstieg der Nationalsozialisten, da auch antidemokratische Einstellungen und politische Fehler eine Rolle spielten. Insgesamt hatte sie einen sehr hohen Stellenwert.", explanation: "Sachurteil: Die Krise wird als Faktor in einer Ursachenstruktur eingeordnet." },
      { kind: "Sachurteil", operator: "beurteilen", title: "Ernennung Hitlers zum Reichskanzler", text: "Die Ernennung Hitlers zum Reichskanzler am 30. Januar 1933 ist als entscheidender Einschnitt in der deutschen Geschichte zu beurteilen. Sie ermöglichte den Nationalsozialisten den Zugang zur staatlichen Macht und leitete die Zerstörung der Demokratie ein. Obwohl Hitler legal ernannt wurde, nutzte die NSDAP die Macht anschließend zur Errichtung einer Diktatur. Der Stellenwert dieses Ereignisses ist daher sehr hoch.", explanation: "Sachurteil: Der historische Einschnitt und seine Folgen werden bestimmt." },
      { kind: "Sachurteil", operator: "beurteilen", title: "Ermächtigungsgesetz 1933", text: "Das Ermächtigungsgesetz ist als zentraler Schritt zur Errichtung der nationalsozialistischen Diktatur zu beurteilen. Es entmachtete das Parlament und übertrug der Regierung weitreichende Gesetzgebungsbefugnisse. Dadurch wurde die Gewaltenteilung faktisch aufgehoben. Insgesamt hatte das Gesetz einen außerordentlich hohen Stellenwert für die Zerstörung des demokratischen Rechtsstaats.", explanation: "Sachurteil: Der Stellenwert für die Errichtung der Diktatur wird erklärt." },
      { kind: "Sachurteil", operator: "beurteilen", title: "NS-Propaganda", text: "Die NS-Propaganda ist als wichtiges Herrschaftsinstrument des Nationalsozialismus zu beurteilen. Sie diente dazu, die Bevölkerung ideologisch zu beeinflussen, Zustimmung zu erzeugen und Feindbilder zu verbreiten. Allerdings beruhte die NS-Herrschaft nicht allein auf Propaganda, sondern auch auf Terror, Repression und Kontrolle. Ihr Stellenwert war daher hoch, aber Teil eines umfassenderen Herrschaftssystems.", explanation: "Sachurteil: Der Stellenwert wird eingeordnet, ohne persönliche Wertmaßstäbe offenzulegen." },
      { kind: "Sachurteil", operator: "beurteilen", title: "Appeasement-Politik", text: "Die Appeasement-Politik Großbritanniens und Frankreichs ist differenziert zu beurteilen. Einerseits sollte sie einen erneuten Krieg verhindern und war vor dem Hintergrund der Erfahrungen des Ersten Weltkriegs nachvollziehbar. Andererseits ermutigte sie Hitler, seine aggressive Außenpolitik fortzusetzen. Insgesamt hatte sie einen hohen Stellenwert, da sie die Expansion des Deutschen Reiches zunächst nicht wirksam stoppte.", explanation: "Sachurteil: Unterschiedliche historische Aspekte werden abgewogen." },
      { kind: "Sachurteil", operator: "beurteilen", title: "Berliner Luftbrücke", text: "Die Berliner Luftbrücke ist als bedeutendes Ereignis im frühen Kalten Krieg zu beurteilen. Sie zeigte die Entschlossenheit der Westmächte, West-Berlin nicht aufzugeben, und stärkte die Bindung der westdeutschen Bevölkerung an die USA und ihre Verbündeten. Gleichzeitig verschärfte sie die Blockbildung zwischen Ost und West. Ihr Stellenwert war daher sowohl symbolisch als auch politisch hoch.", explanation: "Sachurteil: Symbolische und politische Bedeutung werden historisch eingeordnet." },
      { kind: "Sachurteil", operator: "beurteilen", title: "Bau der Berliner Mauer", text: "Der Bau der Berliner Mauer ist als zentraler Einschnitt in der Geschichte der deutschen Teilung zu beurteilen. Er stoppte die Massenflucht aus der DDR und stabilisierte kurzfristig das SED-Regime. Gleichzeitig machte er die Unfreiheit der DDR deutlich sichtbar. Insgesamt hatte der Mauerbau einen sehr hohen Stellenwert für die Verfestigung der deutschen Teilung.", explanation: "Sachurteil: Es wird erklärt, warum der Mauerbau historisch bedeutsam war." },
      { kind: "Sachurteil", operator: "beurteilen", title: "Fall der Berliner Mauer", text: "Der Fall der Berliner Mauer ist als historischer Wendepunkt zu beurteilen. Er symbolisierte das Ende der deutschen Teilung und beschleunigte den Prozess der Wiedervereinigung. Zugleich war er Teil einer größeren Entwicklung, nämlich des Zusammenbruchs der kommunistischen Systeme in Osteuropa. Sein Stellenwert ist daher sehr hoch.", explanation: "Sachurteil: Der Fall der Mauer wird als Wendepunkt und Teil einer größeren Entwicklung eingeordnet." },
      { kind: "Sachurteil", operator: "beurteilen", title: "Wiedervereinigung 1990", text: "Die deutsche Wiedervereinigung ist als bedeutender politischer Einschnitt zu beurteilen. Sie beendete die staatliche Teilung Deutschlands und veränderte die politische Ordnung Europas. Gleichzeitig brachte sie wirtschaftliche, soziale und gesellschaftliche Herausforderungen mit sich. Insgesamt hatte sie einen sehr hohen Stellenwert für Deutschland und Europa.", explanation: "Sachurteil: Folgen und Bedeutung für Deutschland und Europa werden historisch bestimmt." },
      { kind: "Sachurteil", operator: "beurteilen", title: "Kolonialismus", text: "Der europäische Kolonialismus ist als tiefgreifender historischer Prozess zu beurteilen, der politische, wirtschaftliche und kulturelle Folgen für viele Regionen der Welt hatte. Er führte zur Ausbeutung von Ressourcen, zur Unterdrückung lokaler Bevölkerungen und zur Veränderung bestehender Gesellschaftsstrukturen. Sein Stellenwert ist sehr hoch, da seine Folgen bis heute nachwirken.", explanation: "Sachurteil: Die langfristige historische Wirkung wird beschrieben und eingeordnet." },
      { kind: "Sachurteil", operator: "beurteilen", title: "Berliner Mauer kurz", text: "Der Bau der Berliner Mauer ist als wichtiger Einschnitt in der Geschichte der deutschen Teilung zu beurteilen, da er die Fluchtbewegung aus der DDR stoppte und die Teilung Deutschlands dauerhaft sichtbar machte.", explanation: "Sachurteil: Der Satz bestimmt den historischen Stellenwert des Ereignisses." },
      { kind: "Sachurteil", operator: "beurteilen", title: "Ermächtigungsgesetz kurz", text: "Das Ermächtigungsgesetz ist als entscheidender Schritt zur Errichtung der NS-Diktatur zu beurteilen, da es Parlament und Gewaltenteilung ausschaltete.", explanation: "Sachurteil: Es wird die Bedeutung für die Errichtung der Diktatur eingeordnet." },
      { kind: "Sachurteil", operator: "beurteilen", title: "Industrialisierung kurz", text: "Die Industrialisierung ist als tiefgreifender wirtschaftlicher und gesellschaftlicher Wandel zu beurteilen, da sie Produktion, Arbeitswelt und Städte dauerhaft veränderte.", explanation: "Sachurteil: Der Satz ordnet die Industrialisierung als historischen Wandel ein." },
      { kind: "Sachurteil", operator: "beurteilen", title: "Französische Revolution kurz", text: "Die Französische Revolution ist als bedeutender Wendepunkt zu beurteilen, da sie absolutistische Herrschaft infrage stellte und moderne politische Ideen verbreitete.", explanation: "Sachurteil: Der historische Stellenwert wird ohne eigene moralische Maßstäbe benannt." },
      { kind: "Sachurteil", operator: "beurteilen", title: "Kolonialismus kurz", text: "Der Kolonialismus ist als bedeutender historischer Prozess zu beurteilen, da er globale Machtverhältnisse, Wirtschaft und Gesellschaften nachhaltig prägte.", explanation: "Sachurteil: Die Bedeutung des Prozesses wird historisch eingeordnet." },

      { kind: "Werturteil", operator: "bewerten", title: "Französische Revolution", text: "Auf Grundlage der Werte des Grundgesetzes, insbesondere Freiheit, Gleichheit und politischer Mitbestimmung, bewerte ich die Ziele der Französischen Revolution grundsätzlich positiv. Sie richteten sich gegen absolutistische Herrschaft und stärkten die Idee gleicher Rechte. Kritisch zu bewerten ist jedoch die Gewalt während der Revolution, besonders während der Schreckensherrschaft. Insgesamt bewerte ich die Revolution daher ambivalent: Ihre Freiheitsideen sind positiv, ihre gewaltsame Umsetzung teilweise klar abzulehnen.", explanation: "Werturteil: Es werden eigene Maßstäbe wie Freiheit, Gleichheit und Mitbestimmung offengelegt." },
      { kind: "Werturteil", operator: "bewerten", title: "Industrielle Revolution", text: "Gemessen an Menschenwürde, sozialer Gerechtigkeit und Schutz der Schwächeren bewerte ich die sozialen Folgen der Industrialisierung kritisch. Zwar brachte sie technischen Fortschritt und wirtschaftliches Wachstum, jedoch litten viele Arbeiterinnen, Arbeiter und Kinder unter Ausbeutung, Armut und gefährlichen Arbeitsbedingungen. Aus heutiger Sicht sind diese Zustände mit den Werten des Grundgesetzes nicht vereinbar. Deshalb bewerte ich die Industrialisierung sozialgeschichtlich ambivalent.", explanation: "Werturteil: Menschenwürde und soziale Gerechtigkeit werden als Maßstäbe genutzt." },
      { kind: "Werturteil", operator: "bewerten", title: "Kinderarbeit in der Industrialisierung", text: "Auf Grundlage der Menschenwürde und des Rechts auf freie Entfaltung bewerte ich Kinderarbeit in der Industrialisierung eindeutig negativ. Kinder wurden häufig körperlich überfordert, schlecht bezahlt und ihrer Bildungschancen beraubt. Auch wenn Familien damals oft aus wirtschaftlicher Not darauf angewiesen waren, ist diese Ausbeutung nach heutigen Wertmaßstäben nicht zu rechtfertigen.", explanation: "Werturteil: Der Maßstab Menschenwürde wird ausdrücklich genannt." },
      { kind: "Werturteil", operator: "bewerten", title: "Bismarcks Sozialgesetzgebung", text: "Ausgehend von sozialer Sicherheit und Menschenwürde bewerte ich Bismarcks Sozialgesetzgebung grundsätzlich positiv, weil sie Arbeiter erstmals gegen Krankheit, Unfall und Alter absicherte. Gleichzeitig muss berücksichtigt werden, dass Bismarck auch politische Ziele verfolgte und die Sozialdemokratie schwächen wollte. Daher bewerte ich die Maßnahmen insgesamt positiv in ihrer Wirkung, aber kritisch hinsichtlich ihrer politischen Absicht.", explanation: "Werturteil: Soziale Sicherheit und Menschenwürde werden als Wertmaßstäbe offengelegt." },
      { kind: "Werturteil", operator: "bewerten", title: "Sozialistengesetze Bismarcks", text: "Auf Grundlage von Meinungsfreiheit, politischer Teilhabe und Demokratie bewerte ich die Sozialistengesetze kritisch. Sie schränkten politische Organisationen und oppositionelle Bewegungen ein. Auch wenn Bismarck sie mit der Stabilität des Staates begründete, verletzten sie aus heutiger Sicht demokratische Grundrechte. Deshalb bewerte ich sie als nicht vereinbar mit den Wertvorstellungen des Grundgesetzes.", explanation: "Werturteil: Meinungsfreiheit, Teilhabe und Demokratie sind klare Maßstäbe." },
      { kind: "Werturteil", operator: "bewerten", title: "Versailler Vertrag", text: "Aus heutiger Sicht lässt sich der Versailler Vertrag ambivalent bewerten. Einerseits ist es nachvollziehbar, dass die Siegermächte nach dem Ersten Weltkrieg Sicherheit und Wiedergutmachung verlangten. Andererseits belasteten harte Reparationsforderungen und die alleinige Kriegsschuldzuweisung die junge Weimarer Republik stark. Gemessen an Frieden, Gerechtigkeit und internationaler Verständigung bewerte ich den Vertrag daher kritisch, aber nicht einseitig.", explanation: "Werturteil: Frieden, Gerechtigkeit und Verständigung dienen als Wertmaßstäbe." },
      { kind: "Werturteil", operator: "bewerten", title: "Weimarer Demokratie", text: "Auf Grundlage demokratischer Werte wie freier Wahlen, politischer Beteiligung und Rechtsstaatlichkeit bewerte ich die Weimarer Republik grundsätzlich positiv. Sie war Deutschlands erste parlamentarische Demokratie und ermöglichte vielen Bürgerinnen und Bürgern politische Mitbestimmung. Kritisch ist jedoch, dass sie durch antidemokratische Kräfte, politische Gewalt und strukturelle Schwächen stark gefährdet war. Insgesamt bewerte ich sie als wichtigen, aber instabilen demokratischen Versuch.", explanation: "Werturteil: Demokratische Werte und Rechtsstaatlichkeit werden offengelegt." },
      { kind: "Werturteil", operator: "bewerten", title: "Ernennung Hitlers zum Reichskanzler", text: "Auf Grundlage der Werte des Grundgesetzes, besonders Demokratie, Menschenwürde und Rechtsstaatlichkeit, bewerte ich die Ernennung Hitlers zum Reichskanzler äußerst kritisch. Sie eröffnete einer antidemokratischen und menschenverachtenden Bewegung den Zugang zur Macht. Auch wenn die Ernennung formal legal erfolgte, führte sie zur Zerstörung der Demokratie und zur Errichtung einer Diktatur. Deshalb ist sie aus heutiger Sicht klar negativ zu bewerten.", explanation: "Werturteil: Grundgesetzwerte werden ausdrücklich als Bewertungsmaßstab genannt." },
      { kind: "Werturteil", operator: "bewerten", title: "Ermächtigungsgesetz", text: "Gemessen an Demokratie, Gewaltenteilung und Rechtsstaatlichkeit bewerte ich das Ermächtigungsgesetz eindeutig negativ. Es schaltete das Parlament aus und ermöglichte der Regierung, ohne demokratische Kontrolle Gesetze zu erlassen. Damit wurde eine wesentliche Grundlage des Rechtsstaats zerstört. Nach den Wertvorstellungen des Grundgesetzes ist das Ermächtigungsgesetz deshalb klar abzulehnen.", explanation: "Werturteil: Demokratie, Gewaltenteilung und Rechtsstaatlichkeit werden als Maßstäbe genannt." },
      { kind: "Werturteil", operator: "bewerten", title: "NS-Diktatur", text: "Auf Grundlage von Menschenwürde, Freiheit, Gleichheit und Rechtsstaatlichkeit bewerte ich die nationalsozialistische Diktatur eindeutig negativ. Sie beruhte auf Terror, Verfolgung, Rassismus, Antisemitismus und der Abschaffung demokratischer Rechte. Unterschiedliche Perspektiven ändern nichts daran, dass die NS-Herrschaft fundamentale Menschenrechte verletzte. Deshalb ist sie mit den Werten des Grundgesetzes unvereinbar.", explanation: "Werturteil: Menschenwürde, Freiheit, Gleichheit und Rechtsstaatlichkeit sind klare Maßstäbe." },
      { kind: "Werturteil", operator: "bewerten", title: "Judenverfolgung im Nationalsozialismus", text: "Gemessen an der unantastbaren Menschenwürde bewerte ich die Judenverfolgung im Nationalsozialismus eindeutig als verbrecherisch und unmenschlich. Menschen wurden entrechtet, ausgegrenzt, verfolgt und ermordet. Eine Rechtfertigung ist aus heutiger Sicht und auf Grundlage des Grundgesetzes ausgeschlossen. Mein Werturteil ist daher eindeutig ablehnend.", explanation: "Werturteil: Die Menschenwürde wird als zentraler Maßstab genutzt." },
      { kind: "Werturteil", operator: "bewerten", title: "Widerstand gegen den Nationalsozialismus", text: "Auf Grundlage von Menschenwürde, Freiheit und Verantwortung bewerte ich den Widerstand gegen den Nationalsozialismus positiv. Menschen, die Widerstand leisteten, riskierten oft ihr Leben, um gegen Unrecht, Terror und Diktatur einzutreten. Zwar gab es unterschiedliche Motive und Formen des Widerstands, dennoch ist sein Einsatz gegen ein verbrecherisches Regime aus heutiger Sicht besonders anerkennenswert.", explanation: "Werturteil: Menschenwürde, Freiheit und Verantwortung sind offengelegte Wertmaßstäbe." },
      { kind: "Werturteil", operator: "bewerten", title: "Attentat vom 20. Juli 1944", text: "Ausgehend von Menschenwürde, Rechtsstaatlichkeit und Verantwortung bewerte ich das Attentat vom 20. Juli 1944 grundsätzlich positiv, weil es sich gegen die nationalsozialistische Diktatur richtete. Zwar ist Gewalt als politisches Mittel grundsätzlich problematisch, jedoch zielte der Widerstand darauf, ein verbrecherisches Regime zu beenden. Unter Berücksichtigung der Extremsituation bewerte ich den Umsturzversuch daher als gerechtfertigten Widerstand.", explanation: "Werturteil: Der Satz nutzt Menschenwürde, Rechtsstaatlichkeit und Verantwortung als Maßstäbe." },
      { kind: "Werturteil", operator: "bewerten", title: "Appeasement-Politik", text: "Auf Grundlage von Frieden und Schutz menschlichen Lebens lässt sich die Appeasement-Politik zunächst nachvollziehen, da ein weiterer Krieg verhindert werden sollte. Gleichzeitig ist sie kritisch zu bewerten, weil sie Hitlers aggressive Politik nicht stoppte und Staaten wie die Tschechoslowakei im Stich ließ. Aus heutiger Sicht bewerte ich sie daher ambivalent: friedenspolitisch verständlich, politisch aber folgenreich problematisch.", explanation: "Werturteil: Frieden und Schutz menschlichen Lebens werden als Maßstäbe offengelegt." },
      { kind: "Werturteil", operator: "bewerten", title: "Atombombenabwürfe", text: "Gemessen an Menschenwürde und dem Schutz von Zivilisten bewerte ich die Atombombenabwürfe äußerst kritisch. Zwar wurde argumentiert, dass sie den Zweiten Weltkrieg schneller beenden sollten, jedoch trafen sie vor allem die Zivilbevölkerung und verursachten massenhaftes Leid. Unter Berücksichtigung verschiedener Perspektiven bleibt mein Werturteil, dass der Einsatz solcher Waffen mit humanitären Grundsätzen kaum vereinbar ist.", explanation: "Werturteil: Menschenwürde und Schutz von Zivilisten bilden den Bewertungsmaßstab." },
      { kind: "Werturteil", operator: "bewerten", title: "Berliner Mauer", text: "Auf Grundlage von Freiheit, Menschenwürde und Freizügigkeit bewerte ich den Bau der Berliner Mauer eindeutig negativ. Die Mauer hinderte Menschen daran, ihren Wohnort frei zu wählen, trennte Familien und führte zu Gewalt an der Grenze. Auch wenn die DDR-Führung sie politisch begründete, war sie aus heutiger demokratischer Sicht ein Symbol der Unfreiheit.", explanation: "Werturteil: Freiheit, Menschenwürde und Freizügigkeit werden als Werte genannt." },
      { kind: "Werturteil", operator: "bewerten", title: "Schießbefehl", text: "Gemessen an Menschenwürde und dem Recht auf Leben bewerte ich den Schießbefehl an der innerdeutschen Grenze eindeutig als unmenschlich und nicht zu rechtfertigen. Menschen wurden daran gehindert, die DDR zu verlassen, und bei Fluchtversuchen in Lebensgefahr gebracht. Nach den Wertvorstellungen des Grundgesetzes ist dies klar abzulehnen.", explanation: "Werturteil: Menschenwürde und das Recht auf Leben sind klare Wertmaßstäbe." },
      { kind: "Werturteil", operator: "bewerten", title: "Friedliche Revolution 1989", text: "Auf Grundlage von Freiheit, Demokratie und politischer Mitbestimmung bewerte ich die Friedliche Revolution von 1989 sehr positiv. Bürgerinnen und Bürger setzten sich gewaltfrei für Grundrechte, freie Wahlen und das Ende der SED-Diktatur ein. Besonders positiv ist, dass der Wandel weitgehend friedlich verlief. Deshalb bewerte ich die Friedliche Revolution als bedeutendes demokratisches Ereignis.", explanation: "Werturteil: Freiheit, Demokratie und Mitbestimmung werden als Maßstäbe genutzt." },
      { kind: "Werturteil", operator: "bewerten", title: "Deutsche Wiedervereinigung", text: "Gemessen an Freiheit, Selbstbestimmung und demokratischer Teilhabe bewerte ich die deutsche Wiedervereinigung grundsätzlich positiv. Sie ermöglichte den Menschen in der DDR politische Freiheit und demokratische Rechte. Zugleich müssen soziale und wirtschaftliche Schwierigkeiten berücksichtigt werden, die viele Menschen nach 1990 erlebten. Insgesamt bewerte ich die Wiedervereinigung positiv, aber nicht ohne Blick auf ihre Probleme.", explanation: "Werturteil: Freiheit, Selbstbestimmung und demokratische Teilhabe werden offengelegt." },
      { kind: "Werturteil", operator: "bewerten", title: "Kolonialismus", text: "Auf Grundlage von Menschenwürde, Gleichheit und Selbstbestimmung bewerte ich den Kolonialismus eindeutig kritisch. Koloniale Herrschaft beruhte häufig auf Gewalt, Ausbeutung, Rassismus und der Unterdrückung lokaler Bevölkerungen. Auch wenn Kolonialmächte ihre Politik mit wirtschaftlichem Fortschritt oder angeblicher Zivilisierung rechtfertigten, ist dies nach heutigen Wertmaßstäben nicht haltbar. Deshalb bewerte ich den Kolonialismus negativ.", explanation: "Werturteil: Menschenwürde, Gleichheit und Selbstbestimmung sind die Wertmaßstäbe." },
      { kind: "Werturteil", operator: "bewerten", title: "Berliner Mauer kurz", text: "Auf Grundlage von Freiheit und Menschenwürde bewerte ich den Bau der Berliner Mauer negativ, weil er Menschen einsperrte, Familien trennte und grundlegende Freiheitsrechte verletzte.", explanation: "Werturteil: Freiheit und Menschenwürde werden ausdrücklich genutzt." },
      { kind: "Werturteil", operator: "bewerten", title: "Ermächtigungsgesetz kurz", text: "Gemessen an Demokratie und Rechtsstaatlichkeit bewerte ich das Ermächtigungsgesetz eindeutig negativ, weil es die demokratische Kontrolle beseitigte und diktatorische Herrschaft ermöglichte.", explanation: "Werturteil: Demokratie und Rechtsstaatlichkeit bilden den Maßstab." },
      { kind: "Werturteil", operator: "bewerten", title: "Industrialisierung kurz", text: "Ausgehend von Menschenwürde und sozialer Gerechtigkeit bewerte ich die Industrialisierung ambivalent, weil sie Fortschritt brachte, aber zugleich viele Arbeiterinnen und Arbeiter ausbeutete.", explanation: "Werturteil: Menschenwürde und soziale Gerechtigkeit werden als Werte offengelegt." },
      { kind: "Werturteil", operator: "bewerten", title: "Französische Revolution kurz", text: "Gemessen an Freiheit und Gleichheit bewerte ich die Ziele der Französischen Revolution positiv, die Gewalt der Schreckensherrschaft jedoch kritisch.", explanation: "Werturteil: Freiheit und Gleichheit sind klare Maßstäbe." },
      { kind: "Werturteil", operator: "bewerten", title: "Kolonialismus kurz", text: "Auf Grundlage von Menschenwürde, Gleichheit und Selbstbestimmung bewerte ich den Kolonialismus negativ, weil er auf Ausbeutung, Unterdrückung und rassistischen Vorstellungen beruhte.", explanation: "Werturteil: Menschenwürde, Gleichheit und Selbstbestimmung werden offengelegt." }
    ];

    const state = {
      mode: null,
      questionBank: [],
      players: [],
      currentPlayer: 0,
      remaining: [],
      retryPool: [],
      currentQuestion: null,
      currentOptions: [],
      correctIndex: null,
      locked: false,
      timeLimit: 0,
      timeLeft: 0,
      timerId: null,
      answeredCount: 0,
      attemptCount: 0,
      bossRound: false,
      lastPoints: 0,
      hiddenOptions: [],
      solo: { points: 0, correct: 0, wrong: 0, timeouts: 0, streak: 0, bestStreak: 0, energy: 3, maxCombo: 0, level: 1, xp: 0, shield: 1, fifty: 1, freeze: 1, perfect: true }
    };

    const app = document.getElementById("app");
    const confettiLayer = document.getElementById("confettiLayer");
    const TIME_OPTIONS = [0, 10, 15, 20, 30, 45, 90];

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function choice(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function isDuelMode() { return state.mode === "operator-duel" || state.mode === "judgement-duel"; }
    function isJudgementMode() { return state.mode === "judgement-solo" || state.mode === "judgement-duel"; }
    function timeLabel(seconds) { return seconds === 0 ? "Ohne Zeitlimit" : `${seconds} Sekunden`; }
    function levelName(level) {
      return ["Starter", "Spurensucher", "Quellenknacker", "Operator-Profi", "Urteilsmeister", "Klausurlegende", "Endboss"][Math.min(level - 1, 6)];
    }
    function levelFromPoints(points) { return Math.max(1, Math.floor(points / 60) + 1); }
    function xpProgress(points) { return Math.min(100, Math.round(((points % 60) / 60) * 100)); }
    function heartText(energy) { return "♥".repeat(Math.max(0, energy)) + "♡".repeat(Math.max(0, 3 - energy)); }

    function setTimeLimit(seconds) {
      state.timeLimit = Number(seconds) || 0;
      document.querySelectorAll(".time-chip").forEach(btn => {
        btn.classList.toggle("active", Number(btn.dataset.seconds) === state.timeLimit);
      });
    }

    function timeSelectorHtml() {
      return `
        <div class="controls-card">
          <h3 class="controls-title">Zeitlimit pro Frage</h3>
          <div class="time-options">
            ${TIME_OPTIONS.map(sec => `<button class="time-chip ${sec === state.timeLimit ? "active" : ""}" data-seconds="${sec}" type="button">${timeLabel(sec)}</button>`).join("")}
          </div>
        </div>
      `;
    }

    function bindTimeButtons() {
      document.querySelectorAll(".time-chip").forEach(btn => {
        btn.addEventListener("click", () => setTimeLimit(btn.dataset.seconds));
      });
    }

    function startScreen() {
      stopTimer();
      app.innerHTML = `
        <section class="screen">
          <div class="glass hero">
            <div class="topline">
              <span class="pill">Quest Arena</span>
              <span class="pill">Combo, Energie & Bossfragen</span>
              <span class="pill">Joker-System</span>
            </div>
            <h1 class="title">Mr. Lehmanns Operatorentrainer</h1>
            <p class="subtitle">Operatoren verstehen, Urteile unterscheiden und sicherer antworten</p>
            <div class="hero-grid">
              <div class="logo-orb"><div class="sheet"></div></div>
              <div>
                <p style="margin:0;color:#e2e8f0;font-size:1.13rem;line-height:1.65;max-width:980px;font-weight:720;">
                  Trainiere wie in einer Quest Arena: Sammle XP, halte deine Combo, nutze Joker und besiege Bossfragen mit doppelten Punkten.
                </p>
                ${timeSelectorHtml()}
              </div>
            </div>
          </div>

          <div class="mode-grid">
            <div class="glass mode-card">
              <div>
                <h2 style="color:var(--gold)">Operatoren Training</h2>
                <p>Definition lesen, Operator treffen, Combo aufbauen. Bossfragen geben doppelte Punkte.</p>
              </div>
              <button class="btn blue full" id="operatorSoloBtn">Allein starten</button>
            </div>

            <div class="glass mode-card">
              <div>
                <h2 style="color:#34d399">Operatoren Duell</h2>
                <p>2 bis 4 Spieler treten reihum an. Richtige Serien bringen Druck in die Arena.</p>
              </div>
              <button class="btn teal full" id="operatorDuelBtn">Duell starten</button>
            </div>

            <div class="glass mode-card">
              <div>
                <h2 style="color:#a78bfa">Entweder-Oder</h2>
                <p>Entscheide Sachurteil oder Werturteil und sammle XP für saubere Urteils-Moves.</p>
              </div>
              <button class="btn violet full" id="judgementSoloBtn">Allein starten</button>
            </div>

            <div class="glass mode-card">
              <div>
                <h2 style="color:#fb923c">Entweder-Oder Duell</h2>
                <p>Sach- und Werturteile als schnelles Duell mit Rangliste und Arena-Druck.</p>
              </div>
              <button class="btn orange full" id="judgementDuelBtn">Duell starten</button>
            </div>
          </div>
          <p style="color:#64748b;text-align:center;margin:18px 0 0;font-size:.92rem;font-weight:800;">Version: ${APP_VERSION}</p>
        </section>
      `;
      bindTimeButtons();
      document.getElementById("operatorSoloBtn").addEventListener("click", () => startSolo("operator-solo"));
      document.getElementById("operatorDuelBtn").addEventListener("click", () => duelSetupScreen("operator-duel"));
      document.getElementById("judgementSoloBtn").addEventListener("click", () => startSolo("judgement-solo"));
      document.getElementById("judgementDuelBtn").addEventListener("click", () => duelSetupScreen("judgement-duel"));
    }

    function startSolo(mode) {
      state.mode = mode;
      state.players = [{ name: "Training", score: 0, correct: 0, wrong: 0, timeouts: 0 }];
      state.currentPlayer = 0;
      state.solo = { points: 0, correct: 0, wrong: 0, timeouts: 0, streak: 0, bestStreak: 0, energy: 3, maxCombo: 0, level: 1, xp: 0, shield: 1, fifty: 1, freeze: 1, perfect: true };
      startGame();
    }

    function duelSetupScreen(mode) {
      stopTimer();
      const title = mode === "judgement-duel" ? "Entweder-Oder Duell" : "Operatoren Duell";
      const hint = mode === "judgement-duel"
        ? "Sachurteil oder Werturteil? Trage 2 bis 4 Spieler ein."
        : "Definition → Operator. Trage 2 bis 4 Spieler ein.";
      app.innerHTML = `
        <section class="screen setup-wrap">
          <div class="glass setup-card">
            <h2>${title}</h2>
            <p class="setup-sub">${hint} Aktuelles Zeitlimit: <strong>${timeLabel(state.timeLimit)}</strong></p>
            ${timeSelectorHtml()}
            <div class="players-grid">
              ${[1,2,3,4].map(i => `
                <div class="player-row">
                  <div class="badge p${i}">${i}</div>
                  <input type="text" id="player${i}" value="Spieler ${i}" autocomplete="off" />
                </div>`).join("")}
            </div>
            <div class="button-row">
              <button class="btn slate" id="backBtn">Zurück</button>
              <button class="btn teal" id="startDuelBtn">Duell starten</button>
            </div>
          </div>
        </section>
      `;
      bindTimeButtons();
      document.getElementById("backBtn").addEventListener("click", startScreen);
      document.getElementById("startDuelBtn").addEventListener("click", () => {
        const names = [1,2,3,4].map(i => document.getElementById(`player${i}`).value.trim()).filter(Boolean);
        const unique = [];
        const seen = new Set();
        for (const name of names) {
          const key = name.toLowerCase();
          if (!seen.has(key)) { seen.add(key); unique.push(name); }
        }
        if (unique.length < 2) {
          document.querySelector(".setup-card").animate([
            { transform: "translateX(0)" }, { transform: "translateX(-10px)" }, { transform: "translateX(10px)" },
            { transform: "translateX(-8px)" }, { transform: "translateX(8px)" }, { transform: "translateX(0)" }
          ], { duration: 420, easing: "ease" });
          return;
        }
        state.mode = mode;
        state.players = unique.slice(0, 4).map(name => ({ name, score: 0, correct: 0, wrong: 0, timeouts: 0 }));
        state.currentPlayer = 0;
        startGame();
      });
    }

    function startGame() {
      stopTimer();
      state.questionBank = isJudgementMode() ? JUDGEMENT_EXAMPLES : OPERATORS;
      state.remaining = shuffle(state.questionBank.map((_, idx) => idx));
      state.retryPool = [];
      state.currentQuestion = null;
      state.currentOptions = [];
      state.correctIndex = null;
      state.locked = false;
      state.answeredCount = 0;
      state.attemptCount = 0;
      state.bossRound = false;
      state.lastPoints = 0;
      state.hiddenOptions = [];
      buildQuizScreen();
      nextQuestion();
    }

    function buildQuizScreen() {
      const quizTitle = isJudgementMode() ? "Sachurteil oder Werturteil?" : "Welche Operatoren-Bezeichnung passt?";
      const modeLabel = modeName();
      app.innerHTML = `
        <section class="screen quiz-layout">
          <aside class="glass sidebar">
            <h2 class="sidebar-title">Quest Arena</h2>
            <div class="game-hud" id="gameHud"></div>
            <div class="progress-label" id="progressLabel"></div>
            <div class="timer-box" id="timerBox">
              <div class="timer-line"><span>Zeit</span><span id="timerText"></span></div>
              <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>
            </div>
            <div class="stat-list" id="scoreArea"></div>
            <div class="side-note" id="modeHint"></div>
            <div class="sidebar-actions">
              <button class="btn slate" id="homeBtn">Startmenü</button>
              <button class="btn violet" id="restartBtn">Neu starten</button>
            </div>
          </aside>

          <main class="glass content">
            <div class="boss-alert" id="bossAlert">Bossfrage: doppelte Punkte, aber kein Platz für Wackler.</div>
            <div class="question-shell" id="questionShell">
              <div class="question-card">
                <div class="question-head">
                  <div class="small-orb"><div class="small-sheet"></div></div>
                  <div>
                    <div class="question-kicker">${escapeHtml(modeLabel)}</div>
                    <h2 class="question-title" id="questionTitle">${escapeHtml(quizTitle)}</h2>
                    <p class="question-text" id="questionText"></p>
                    <div class="meta-row" id="metaRow"></div>
                  </div>
                </div>
              </div>
            </div>
            <div class="feedback" id="feedbackLine"></div>
            <div class="choices" id="choicesGrid"></div>
            <div class="explanation-box" id="explanationBox"></div>
          </main>
        </section>
      `;
      document.getElementById("homeBtn").addEventListener("click", startScreen);
      document.getElementById("restartBtn").addEventListener("click", () => {
        if (isDuelMode()) duelSetupScreen(state.mode);
        else startSolo(state.mode);
      });
      buildChoiceButtons();
      bindPowerButtons();
    }

    function buildChoiceButtons() {
      const grid = document.getElementById("choicesGrid");
      grid.innerHTML = "";
      const labels = isJudgementMode() ? ["Sachurteil", "Werturteil"] : ["A", "B", "C", "D"];
      labels.forEach((label, index) => {
        const button = document.createElement("button");
        button.className = `choice ${isJudgementMode() ? "binary" : ""}`;
        button.dataset.index = index;
        button.innerHTML = `
          <div class="choice-inner">
            <div class="choice-badge">${escapeHtml(isJudgementMode() ? (index === 0 ? "A" : "B") : label)}</div>
            <div class="choice-text">${escapeHtml(label)}</div>
          </div>`;
        button.addEventListener("click", () => submitAnswer(index, false));
        grid.appendChild(button);
      });
    }

    function modeName() {
      return {
        "operator-solo": "Operatoren Training",
        "operator-duel": "Operatoren Duell",
        "judgement-solo": "Entweder-Oder Training",
        "judgement-duel": "Entweder-Oder Duell"
      }[state.mode] || "Training";
    }

    function updateSidebar() {
      const unresolved = state.remaining.length + state.retryPool.length;
      const total = state.questionBank.length;
      document.getElementById("progressLabel").textContent = `Noch offen: ${unresolved} von ${total} Aufgaben`;
      const scoreArea = document.getElementById("scoreArea");
      const modeHint = document.getElementById("modeHint");
      const gameHud = document.getElementById("gameHud");
      scoreArea.innerHTML = "";
      if (gameHud) {
        gameHud.innerHTML = gameHudHtml();
        bindPowerButtons();
      }
      syncPowerButtons();
      if (!isDuelMode()) {
        modeHint.textContent = isJudgementMode()
          ? "Mission: Erkenne den Maßstab. Sachurteil ordnet historisch ein, Werturteil legt Werte offen."
          : "Mission: Halte die Combo. Falsche Operatoren kommen später wieder in den Pool.";
        const stats = [
          ["Punkte", state.solo.points, "linear-gradient(180deg,#60a5fa,#2563eb)", ""],
          ["Richtig", state.solo.correct, "linear-gradient(180deg,#4ade80,#16a34a)", ""],
          ["Falsch", state.solo.wrong, "linear-gradient(180deg,#fb7185,#dc2626)", `${state.solo.timeouts}× Zeit abgelaufen`],
          ["Combo", state.solo.streak, "linear-gradient(180deg,#fbbf24,#f97316)", `Beste: ${state.solo.bestStreak}`]
        ];
        for (const [label, value, bg, sub] of stats) {
          const card = document.createElement("div");
          card.className = "stat-card";
          card.style.background = bg;
          card.innerHTML = `<div class="stat-inner"><div class="stat-name">${escapeHtml(label)}</div><div class="stat-value">${escapeHtml(value)}</div>${sub ? `<div class="stat-sub">${escapeHtml(sub)}</div>` : ""}</div>`;
          scoreArea.appendChild(card);
        }
      } else {
        const active = state.players[state.currentPlayer];
        modeHint.textContent = `Am Zug: ${active ? active.name : "-"} • Bossfragen zählen doppelt`;
        state.players.forEach((player, idx) => {
          const card = document.createElement("div");
          card.className = `turn-card ${idx === state.currentPlayer ? "active" : ""}`;
          card.style.background = idx === 0 ? "linear-gradient(180deg,#60a5fa,#2563eb)" : idx === 1 ? "linear-gradient(180deg,#a78bfa,#7c3aed)" : idx === 2 ? "linear-gradient(180deg,#4ade80,#16a34a)" : "linear-gradient(180deg,#fbbf24,#f97316)";
          card.innerHTML = `
            <div class="turn-inner">
              <div class="turn-name">${escapeHtml(player.name)}</div>
              <div class="turn-points">${player.score} Punkte</div>
              <div class="turn-line">${player.correct} richtig • ${player.wrong} falsch • ${player.timeouts} Zeitfehler</div>
            </div>`;
          scoreArea.appendChild(card);
        });
      }
    }

    function nextQuestion() {
      stopTimer();
      if (!state.remaining.length && state.retryPool.length) {
        state.remaining = shuffle(state.retryPool);
        state.retryPool = [];
      }
      if (!state.remaining.length) {
        endScreen();
        return;
      }
      state.locked = true;
      document.getElementById("feedbackLine").textContent = "";
      document.getElementById("feedbackLine").style.color = "var(--gold)";
      document.getElementById("explanationBox").classList.remove("active");
      document.getElementById("explanationBox").textContent = "";

      state.currentQuestion = state.remaining.pop();
      state.attemptCount += 1;
      state.hiddenOptions = [];
      state.bossRound = state.attemptCount % 5 === 0;
      const q = state.questionBank[state.currentQuestion];

      if (isJudgementMode()) setupJudgementQuestion(q);
      else setupOperatorQuestion(q);

      updateBossVisual();
      updateSidebar();
      animateQuestionEntry();
      setTimeout(() => {
        state.locked = false;
        startTimer();
      }, 260);
    }

    function setupOperatorQuestion(q) {
      document.getElementById("questionTitle").textContent = "Welche Operatoren-Bezeichnung passt?";
      const textEl = document.getElementById("questionText");
      textEl.textContent = q.definition;
      textEl.classList.toggle("long", q.definition.length > 220);
      const meta = document.getElementById("metaRow");
      meta.innerHTML = `<span class="meta-chip">AFB: ${escapeHtml(q.afb)}</span><span class="meta-chip">Definition → Operator</span>`;
      const wrongs = OPERATORS.map((item, idx) => ({ idx, operator: item.operator })).filter(item => item.idx !== state.currentQuestion);
      const options = shuffle([...shuffle(wrongs).slice(0, 3).map(item => item.operator), q.operator]);
      state.currentOptions = options;
      state.correctIndex = options.indexOf(q.operator);
      document.querySelectorAll(".choice").forEach((button, index) => {
        button.className = "choice";
        button.querySelector(".choice-badge").textContent = ["A", "B", "C", "D"][index];
        button.querySelector(".choice-text").textContent = options[index];
      });
    }

    function setupJudgementQuestion(q) {
      document.getElementById("questionTitle").textContent = "Ist das ein Sachurteil oder ein Werturteil?";
      const textEl = document.getElementById("questionText");
      textEl.textContent = q.text;
      textEl.classList.toggle("long", q.text.length > 260);
      const meta = document.getElementById("metaRow");
      meta.innerHTML = `<span class="meta-chip">Thema: ${escapeHtml(q.title)}</span><span class="meta-chip">Entweder-Oder</span>`;
      state.currentOptions = ["Sachurteil", "Werturteil"];
      state.correctIndex = q.kind === "Sachurteil" ? 0 : 1;
      document.querySelectorAll(".choice").forEach((button, index) => {
        button.className = "choice binary";
        button.querySelector(".choice-badge").textContent = index === 0 ? "A" : "B";
        button.querySelector(".choice-text").textContent = state.currentOptions[index];
      });
    }

    function startTimer() {
      const box = document.getElementById("timerBox");
      if (!state.timeLimit) {
        box.classList.remove("active");
        return;
      }
      state.timeLeft = state.timeLimit;
      box.classList.add("active");
      renderTimer();
      state.timerId = setInterval(() => {
        state.timeLeft -= 1;
        renderTimer();
        if (state.timeLeft <= 0) {
          stopTimer(false);
          submitAnswer(-1, true);
        }
      }, 1000);
    }

    function renderTimer() {
      const text = document.getElementById("timerText");
      const fill = document.getElementById("timerFill");
      if (!text || !fill || !state.timeLimit) return;
      text.textContent = `${Math.max(0, state.timeLeft)} s`;
      const pct = Math.max(0, Math.min(100, (state.timeLeft / state.timeLimit) * 100));
      fill.style.width = `${pct}%`;
    }

    function stopTimer(resetVisual = true) {
      if (state.timerId) clearInterval(state.timerId);
      state.timerId = null;
      if (resetVisual) state.timeLeft = 0;
    }

    function animateQuestionEntry() {
      const shell = document.getElementById("questionShell");
      shell.animate([
        { transform: "translateY(8px) scale(.99)", filter: "brightness(.94)" },
        { transform: "translateY(0) scale(1)", filter: "brightness(1)" }
      ], { duration: 260, easing: "ease-out" });
      document.getElementById("questionText").animate([
        { opacity: .25, transform: "translateY(10px)" },
        { opacity: 1, transform: "translateY(0)" }
      ], { duration: 280, easing: "ease-out" });
    }

    function submitAnswer(index, timedOut) {
      if (state.locked && !timedOut) return;
      stopTimer(false);
      state.locked = true;
      const q = state.questionBank[state.currentQuestion];
      const correct = !timedOut && index === state.correctIndex;
      const buttons = document.querySelectorAll(".choice");
      buttons.forEach(btn => btn.classList.add("locked"));
      if (buttons[state.correctIndex]) buttons[state.correctIndex].classList.add("correct");
      if (!correct && buttons[index]) buttons[index].classList.add("wrong");
      if (timedOut) {
        document.getElementById("feedbackLine").textContent = `Zeit abgelaufen! Richtig wäre: ${isJudgementMode() ? q.kind : q.operator}`;
      } else if (correct) {
        document.getElementById("feedbackLine").textContent = isJudgementMode()
          ? `Richtig! Das ist ein ${q.kind}. +${scorePreview()} Punkte`
          : `Richtig! ${q.operator} ist korrekt. +${scorePreview()} Punkte`;
      } else {
        document.getElementById("feedbackLine").textContent = isJudgementMode()
          ? `Noch nicht. Richtig wäre: ${q.kind}`
          : `Noch nicht. Richtig wäre: ${q.operator}`;
      }
      document.getElementById("feedbackLine").style.color = correct ? "#22c55e" : "#f87171";

      const explanationBox = document.getElementById("explanationBox");
      if (isJudgementMode()) {
        explanationBox.textContent = q.explanation;
        explanationBox.classList.add("active");
      }

      applyScore(correct, timedOut);
      if (correct) {
        document.getElementById("feedbackLine").textContent += state.bossRound ? " | Boss besiegt!" : state.solo.streak >= 3 && !isDuelMode() ? " | Combo läuft!" : "";
      } else if (!isDuelMode() && state.solo.shield < 0) {
        document.getElementById("feedbackLine").textContent += " | Schild hat dich gerettet.";
        state.solo.shield = 0;
      }
      pulseQuestion(correct);
      if (correct) createSparkles(isJudgementMode() ? "#a78bfa" : "#22c55e");
      else shakeQuestion();
      updateSidebar();

      setTimeout(() => {
        if (isDuelMode()) state.currentPlayer = (state.currentPlayer + 1) % state.players.length;
        nextQuestion();
      }, isJudgementMode() ? 2350 : 1750);
    }

    function applyScore(correct, timedOut) {
      if (correct) {
        if (isDuelMode()) {
          const p = state.players[state.currentPlayer];
          const gained = scorePreview();
          p.score += gained;
          p.correct += 1;
        } else {
          const beforeLevel = state.solo.level;
          const gained = scorePreview();
          state.lastPoints = gained;
          state.solo.points += gained;
          state.solo.correct += 1;
          state.solo.streak += 1;
          state.solo.bestStreak = Math.max(state.solo.bestStreak, state.solo.streak);
          state.solo.maxCombo = Math.max(state.solo.maxCombo, state.solo.streak);
          state.solo.level = levelFromPoints(state.solo.points);
          state.solo.xp = xpProgress(state.solo.points);
          if (state.solo.level > beforeLevel) showLevelPop();
        }
        state.answeredCount += 1;
      } else {
        state.retryPool.push(state.currentQuestion);
        if (isDuelMode()) {
          const p = state.players[state.currentPlayer];
          p.wrong += 1;
          if (timedOut) p.timeouts += 1;
        } else {
          state.solo.wrong += 1;
          state.solo.perfect = false;
          if (timedOut) state.solo.timeouts += 1;
          state.solo.streak = 0;
          if (state.solo.shield === 2) {
            state.solo.shield = -1;
          } else {
            state.solo.energy = Math.max(0, state.solo.energy - 1);
          }
        }
      }
    }

    function scorePreview() {
      const combo = !isDuelMode() ? state.solo.streak : 0;
      const comboBonus = !isDuelMode() ? Math.min(10, combo * 2) : 0;
      const bossBonus = state.bossRound ? 2 : 1;
      const speedBonus = state.timeLimit && state.timeLeft > Math.ceil(state.timeLimit / 2) ? 5 : 0;
      return (10 + comboBonus + speedBonus) * bossBonus;
    }

    function gameHudHtml() {
      if (isDuelMode()) {
        const top = [...state.players].sort((a, b) => b.score - a.score)[0];
        return `
          <div class="arena-title"><span>Duell Arena</span><span class="level-chip">${state.bossRound ? "Boss aktiv" : "Runde " + Math.max(1, state.attemptCount)}</span></div>
          <div class="mission-strip">
            <div class="mission-item"><div class="mission-label">Top</div><div class="mission-value">${escapeHtml(top ? top.name : "-")}</div></div>
            <div class="mission-item"><div class="mission-label">Boss</div><div class="mission-value">jede 5.</div></div>
            <div class="mission-item"><div class="mission-label">Preis</div><div class="mission-value">bis 30 XP</div></div>
          </div>`;
      }
      return `
        <div class="arena-title"><span>${escapeHtml(levelName(state.solo.level))}</span><span class="level-chip">Level ${state.solo.level}</span></div>
        <div class="xp-track"><div class="xp-fill" style="width:${state.solo.xp}%"></div></div>
        <div class="mission-strip">
          <div class="mission-item"><div class="mission-label">Energie</div><div class="mission-value">${heartText(state.solo.energy)}</div></div>
          <div class="mission-item"><div class="mission-label">Combo</div><div class="mission-value">x${state.solo.streak}</div></div>
          <div class="mission-item"><div class="mission-label">Nächste</div><div class="mission-value">${state.bossRound ? "Boss" : "+" + scorePreview()}</div></div>
        </div>
        <div class="power-row">
          <button class="power-btn" id="fiftyBtn" type="button">50/50<br>${state.solo.fifty}</button>
          <button class="power-btn" id="shieldBtn" type="button">Schild<br>${state.solo.shield === 2 ? "aktiv" : Math.max(0, state.solo.shield)}</button>
          <button class="power-btn" id="freezeBtn" type="button">Freeze<br>${state.solo.freeze}</button>
        </div>`;
    }

    function bindPowerButtons() {
      const fifty = document.getElementById("fiftyBtn");
      const shield = document.getElementById("shieldBtn");
      const freeze = document.getElementById("freezeBtn");
      if (fifty) fifty.addEventListener("click", useFifty);
      if (shield) shield.addEventListener("click", useShield);
      if (freeze) freeze.addEventListener("click", useFreeze);
    }

    function syncPowerButtons() {
      if (isDuelMode()) return;
      const fifty = document.getElementById("fiftyBtn");
      const shield = document.getElementById("shieldBtn");
      const freeze = document.getElementById("freezeBtn");
      if (fifty) fifty.disabled = state.locked || state.solo.fifty <= 0 || state.hiddenOptions.length > 0;
      if (shield) shield.disabled = state.solo.shield <= 0 || state.solo.shield === 2;
      if (freeze) freeze.disabled = state.solo.freeze <= 0 || !state.timeLimit || state.locked;
    }

    function useFifty() {
      if (state.locked || state.solo.fifty <= 0 || state.hiddenOptions.length) return;
      const buttons = [...document.querySelectorAll(".choice")];
      const wrongIndexes = buttons.map((_, idx) => idx).filter(idx => idx !== state.correctIndex);
      const hideCount = isJudgementMode() ? 1 : 2;
      state.hiddenOptions = shuffle(wrongIndexes).slice(0, hideCount);
      state.hiddenOptions.forEach(idx => buttons[idx]?.classList.add("hidden-option"));
      state.solo.fifty -= 1;
      document.getElementById("feedbackLine").textContent = "Joker gezündet: gefährliche Antworten verschwinden.";
      updateSidebar();
    }

    function useShield() {
      if (state.solo.shield !== 1) return;
      state.solo.shield = 2;
      document.getElementById("feedbackLine").textContent = "Schild bereit: der nächste Fehler kostet keine Energie.";
      updateSidebar();
    }

    function useFreeze() {
      if (state.solo.freeze <= 0 || !state.timeLimit || state.locked) return;
      state.solo.freeze -= 1;
      state.timeLeft = Math.min(state.timeLimit, state.timeLeft + 10);
      renderTimer();
      document.getElementById("feedbackLine").textContent = "Freeze: +10 Sekunden.";
      updateSidebar();
    }

    function updateBossVisual() {
      const shell = document.getElementById("questionShell");
      const alert = document.getElementById("bossAlert");
      if (shell) shell.classList.toggle("boss", state.bossRound);
      if (alert) alert.classList.toggle("active", state.bossRound);
    }

    function showLevelPop() {
      const pop = document.createElement("div");
      pop.className = "level-pop";
      pop.textContent = `Level up: ${levelName(state.solo.level)}`;
      document.body.appendChild(pop);
      setTimeout(() => pop.remove(), 1400);
    }

    function pulseQuestion(correct) {
      const shell = document.getElementById("questionShell");
      shell.animate([
        { background: correct ? "linear-gradient(180deg,#4ade80,#16a34a)" : "linear-gradient(180deg,#fb7185,#dc2626)" },
        { background: "linear-gradient(180deg,#60a5fa,#2563eb)" }
      ], { duration: 720, easing: "ease" });
    }

    function shakeQuestion() {
      const shell = document.getElementById("questionShell");
      shell.animate([
        { transform: "translateX(0)" }, { transform: "translateX(-10px)" }, { transform: "translateX(10px)" },
        { transform: "translateX(-8px)" }, { transform: "translateX(8px)" }, { transform: "translateX(0)" }
      ], { duration: 420, easing: "ease" });
    }

    function createSparkles(color) {
      for (let i = 0; i < 18; i++) {
        const dot = document.createElement("div");
        dot.className = "sparkle";
        dot.style.background = color;
        dot.style.left = `${40 + Math.random() * (window.innerWidth - 80)}px`;
        dot.style.top = `${30 + Math.random() * 110}px`;
        dot.style.setProperty("--sx", `${-90 + Math.random() * 180}px`);
        dot.style.setProperty("--sy", `${10 + Math.random() * 95}px`);
        confettiLayer.appendChild(dot);
        setTimeout(() => dot.remove(), 720);
      }
    }

    function endScreen() {
      stopTimer();
      if (!isDuelMode()) renderSoloResults();
      else renderDuelResults();
      createConfetti();
    }

    function renderSoloResults() {
      const subtitle = isJudgementMode() ? "Entweder-Oder Quest abgeschlossen" : "Operatoren Quest abgeschlossen";
      app.innerHTML = `
        <section class="screen results-wrap">
          <div class="glass hero">
            <div class="topline"><span class="pill">🎉 Geschafft</span><span class="pill">${escapeHtml(modeName())}</span></div>
            <h1 class="title">Mr. Lehmanns Operatorentrainer</h1>
            <p class="subtitle">${escapeHtml(subtitle)}. Alle Aufgaben wurden erfolgreich durchgespielt.</p>
          </div>
          <div class="glass results-card">
            <h2 class="results-title">Quest Ergebnis</h2>
            <div class="result-grid">
              ${tileHtml("XP", state.solo.points, "linear-gradient(180deg,#60a5fa,#2563eb)")}
              ${tileHtml("Level", state.solo.level + " · " + levelName(state.solo.level), "linear-gradient(180deg,#a78bfa,#7c3aed)")}
              ${tileHtml("Richtig", state.solo.correct, "linear-gradient(180deg,#4ade80,#16a34a)")}
              ${tileHtml("Max Combo", state.solo.bestStreak, "linear-gradient(180deg,#fbbf24,#f97316)")}
            </div>
            <p class="results-sub">${state.solo.perfect ? "Perfekte Quest. Keine Fehler, volle Konzentration." : state.solo.energy > 0 ? "Quest geschafft. Die Wiederholungen haben dich sauber durchgezogen." : "Knapp, aber durch: Deine Energie war leer, die Quest ist trotzdem beendet."}</p>
            <div class="button-row">
              <button class="btn blue" id="againBtn">Nochmal spielen</button>
              <button class="btn slate" id="homeAfterBtn">Zum Startmenü</button>
            </div>
          </div>
        </section>
      `;
      document.getElementById("againBtn").addEventListener("click", () => startSolo(state.mode));
      document.getElementById("homeAfterBtn").addEventListener("click", startScreen);
    }

    function renderDuelResults() {
      const ranking = [...state.players].sort((a, b) => (b.score - a.score) || (b.correct - a.correct) || (a.wrong - b.wrong));
      const winner = ranking[0];
      app.innerHTML = `
        <section class="screen results-wrap">
          <div class="glass hero">
            <div class="topline"><span class="pill">🏆 Duell beendet</span><span class="pill">${escapeHtml(modeName())}</span></div>
            <h1 class="title">Mr. Lehmanns Operatorentrainer</h1>
            <p class="subtitle">Alle Aufgaben wurden erfolgreich durchgespielt. Hier ist die Rangliste.</p>
          </div>
          <div class="winner-grid">
            <div class="glass results-card">
              <h2 class="results-title">Sieger</h2>
              <div style="font-family:Georgia,serif;font-size:clamp(2rem,4vw,3rem);font-weight:900;color:#34d399;margin-top:14px;overflow-wrap:anywhere;">${escapeHtml(winner.name)}</div>
              <div style="font-size:2rem;font-weight:1000;margin-top:8px;">${winner.score} XP</div>
              <p class="results-sub">Glückwunsch! ${winner.correct} richtige Antworten.</p>
            </div>
            <div class="glass results-card">
              <h2 class="results-title">Rangliste</h2>
              <div class="rank-list">
                ${ranking.map((p, i) => `
                  <div class="rank-card" style="background:${i === 0 ? "linear-gradient(180deg,#fbbf24,#f97316)" : i === 1 ? "linear-gradient(180deg,#cbd5e1,#94a3b8)" : i === 2 ? "linear-gradient(180deg,#fb923c,#ea580c)" : "linear-gradient(180deg,#60a5fa,#2563eb)"}">
                    <div class="rank-inner">
                      <div class="rank-name">#${i + 1} ${escapeHtml(p.name)}</div>
                      <div class="rank-line">${p.score} XP • ${p.correct} richtig • ${p.wrong} falsch • ${p.timeouts} Zeitfehler</div>
                    </div>
                  </div>`).join("")}
              </div>
            </div>
          </div>
          <div class="button-row" style="justify-content:center;">
            <button class="btn teal" id="againDuelBtn">Nochmal spielen</button>
            <button class="btn slate" id="homeDuelBtn">Zum Startmenü</button>
          </div>
        </section>
      `;
      document.getElementById("againDuelBtn").addEventListener("click", () => duelSetupScreen(state.mode));
      document.getElementById("homeDuelBtn").addEventListener("click", startScreen);
    }

    function tileHtml(label, value, bg) {
      return `<div class="stat-card" style="background:${bg}"><div class="stat-inner"><div class="stat-name">${escapeHtml(label)}</div><div class="stat-value">${escapeHtml(value)}</div></div></div>`;
    }

    function createConfetti() {
      confettiLayer.innerHTML = "";
      const colors = ["#38bdf8", "#fbbf24", "#a78bfa", "#34d399", "#fb7185", "#f97316"];
      for (let i = 0; i < 140; i++) {
        const piece = document.createElement("div");
        piece.className = `piece ${Math.random() > .5 ? "circle" : ""}`;
        piece.style.background = choice(colors);
        piece.style.left = `${Math.random() * 100}vw`;
        piece.style.top = `${-20 - Math.random() * 140}px`;
        piece.style.setProperty("--dx", `${-180 + Math.random() * 360}px`);
        piece.style.setProperty("--rot", `${-360 + Math.random() * 720}deg`);
        piece.style.animationDuration = `${3 + Math.random() * 2.5}s`;
        confettiLayer.appendChild(piece);
      }
      setTimeout(() => { confettiLayer.innerHTML = ""; }, 6000);
    }

    startScreen();
  </script>
</body>
</html>
